# Project-wide Gradle settings.
# Enable AndroidX support to resolve modern Jetpack libraries
android.useAndroidX=true
# Automatically migrate legacy libraries to AndroidX
android.enableJetifier=true
# Use the official Kotlin coding style
kotlin.code.style=official
# Optimize JVM memory allocation for Gradle builds
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8